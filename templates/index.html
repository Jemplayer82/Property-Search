{% extends "base.html" %}
{% block content %}
<div class="row g-4">

  <!-- Filters Sidebar -->
  <div class="col-lg-3">
    <div class="card shadow-sm sticky-top" style="top:76px;max-height:calc(100vh - 100px);overflow-y:auto">
      <div class="card-header bg-dark text-white fw-semibold">
        <i class="bi bi-funnel me-2"></i>Filters
      </div>
      <div class="card-body">
        <form id="searchForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">Location</label>
            <input type="text" class="form-control" name="location" value="{{ config.location }}" placeholder="City, State or ZIP">
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Distance (miles)</label>
            <input type="number" class="form-control" name="distance" value="{{ config.filters.get('distance', 0) }}" placeholder="0 to ignore" min="0" step="0.1">
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Status</label>
            <select class="form-select" name="status">
              <option value="for sale" {% if config.filters.status[0]=='for sale' %}selected{% endif %}>For Sale</option>
              <option value="sold"     {% if config.filters.status[0]=='sold'     %}selected{% endif %}>Sold</option>
              <option value="pending"  {% if config.filters.status[0]=='pending'  %}selected{% endif %}>Pending</option>
            </select>
          </div>

          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">Min Price</label>
              <input type="number" class="form-control" name="min_price" value="{{ config.filters.min_price }}" step="10000" min="0">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Max Price</label>
              <input type="number" class="form-control" name="max_price" value="{{ config.filters.max_price }}" step="10000" min="0">
            </div>
          </div>

          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">Min Beds</label>
              <select class="form-select" name="min_beds">
                {% for i in range(6) %}
                <option value="{{ i }}" {% if config.filters.min_beds == i %}selected{% endif %}>{{ i }}+</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Min Baths</label>
              <select class="form-select" name="min_baths">
                {% for i in range(5) %}
                <option value="{{ i }}" {% if config.filters.min_baths == i %}selected{% endif %}>{{ i }}+</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">Min Sqft</label>
              <input type="number" class="form-control" name="min_sqft" placeholder="e.g. 1000" min="0" step="100">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Max Sqft</label>
              <input type="number" class="form-control" name="max_sqft" placeholder="e.g. 3000" min="0" step="100">
            </div>
          </div>

          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">Max Age (yrs)</label>
              <input type="number" class="form-control" name="max_age" placeholder="e.g. 5" min="0">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Min Age (yrs)</label>
              <input type="number" class="form-control" name="min_age" placeholder="e.g. 50" min="0">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Property Type</label>
            {% set ptypes = [('house','House'),('condo','Condo'),('townhouse','Townhouse'),('multi-family','Multi-Family')] %}
            {% for val, label in ptypes %}
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="property_types" value="{{ val }}" id="t_{{ val }}"
                {% if val in config.filters.property_types %}checked{% endif %}>
              <label class="form-check-label" for="t_{{ val }}">{{ label }}</label>
            </div>
            {% endfor %}
          </div>

          <button type="submit" class="btn btn-primary w-100" id="searchBtn">
            <i class="bi bi-search me-2"></i>Search
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="col-lg-9">
    <div id="statusBar" class="d-none alert mb-3"></div>
    <div id="resultsHeader" class="d-none d-flex justify-content-between align-items-center mb-3">
      <h6 id="resultsCount" class="mb-0 text-muted"></h6>
      <a href="/map?results=search" class="btn btn-sm btn-outline-secondary"><i class="bi bi-map me-1"></i>View on Map</a>
    </div>
    <div id="listings" class="row g-3"></div>
    <div id="emptyState" class="text-center text-muted py-5">
      <i class="bi bi-house-door" style="font-size:4rem;opacity:.3"></i>
      <p class="mt-3">Set your filters and click Search to find listings.</p>
    </div>
  </div>
</div>

<script>
const form = document.getElementById('searchForm');
const btn  = document.getElementById('searchBtn');

form.addEventListener('submit', async e => {
  e.preventDefault();
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Searching…';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const fd = new FormData(form);
  const payload = {
    location:       fd.get('location'),
    distance:       parseFloat(fd.get('distance')) || 0,
    status:         fd.get('status'),
    min_price:      parseInt(fd.get('min_price')) || 0,
    max_price:      parseInt(fd.get('max_price')) || 0,
    min_beds:       parseInt(fd.get('min_beds')) || 0,
    min_baths:      parseInt(fd.get('min_baths')) || 0,
    property_types:  [...form.querySelectorAll('[name=property_types]:checked')].map(el => el.value),
    min_sqft: parseInt(fd.get('min_sqft')) || null,
    max_sqft: parseInt(fd.get('max_sqft')) || null,
    max_age: parseInt(fd.get('max_age')) || null,
    min_age: parseInt(fd.get('min_age')) || null,
  };

  try {
    const res  = await fetch('/search', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    const data = await res.json();
    if (data.error) {
      showStatus('danger', 'Error: ' + data.error);
      localStorage.removeItem('searchResults');
    }
    else {
      renderResults(data);
      showStatus('success', `Found ${data.total} listing(s)`);
    }
  } catch(err) {
    showStatus('danger', 'Request failed: ' + err);
    localStorage.removeItem('searchResults');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-search me-2"></i>Search';
  }
});

function showStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  bar.className = `alert alert-${type}`;
  bar.textContent = msg;
  bar.classList.remove('d-none');
}

function fmtPrice(v) {
  const n = parseInt(v);
  return isNaN(n) ? (v || '—') : '$' + n.toLocaleString();
}

function renderResults({ total, new: newCount, listings }) {
  // Sort newest listed first
  listings.sort((a, b) => {
    if (a.list_date && b.list_date) return b.list_date.localeCompare(a.list_date);
    return (parseInt(a.days_on_market) || 9999) - (parseInt(b.days_on_market) || 9999);
  });
  document.getElementById('resultsCount').textContent = `${total} listing(s) found · ${newCount} new`;
  document.getElementById('resultsHeader').classList.remove('d-none');
  document.getElementById('emptyState').classList.add('d-none');

  // Save search results to localStorage for map view
  if (listings && listings.length > 0) {
    const searchData = {
      listings: listings,
      timestamp: new Date().toISOString(),
      total: total
    };
    localStorage.setItem('searchResults', JSON.stringify(searchData));
    console.log(`✓ Saved ${listings.length} listings to localStorage`);
    console.log('Sample listing:', listings[0]);
  }

  const container = document.getElementById('listings');
  if (!listings.length) {
    container.innerHTML = '';
    document.getElementById('emptyState').classList.remove('d-none');
    localStorage.removeItem('searchResults');
    return;
  }

  container.innerHTML = listings.map(l => `
    <div class="col-md-6 col-xl-4">
      <div class="card h-100 shadow-sm ${l.is_new ? 'border-success border-2' : ''}">
        ${l.photo && l.photo !== 'None' && l.photo !== '' ? `<img src="${l.photo}" class="card-img-top" style="height:180px;object-fit:cover" referrerpolicy="no-referrer" onerror="this.style.display='none'">` : ''}
        <div class="card-body">
          ${l.is_new ? '<span class="badge bg-success mb-2">NEW</span>' : ''}
          <h6 class="card-title mb-1">${l.address || '—'}</h6>
          <p class="text-muted small mb-2">${l.city}, ${l.state} ${l.zip}</p>
          <p class="fs-5 fw-bold text-primary mb-2">${fmtPrice(l.price)}</p>
          <div class="d-flex gap-3 text-muted small mb-2">
            <span><i class="bi bi-door-open"></i> ${l.beds || '—'} bed</span>
            <span><i class="bi bi-droplet"></i> ${l.baths || '—'} bath</span>
            <span><i class="bi bi-rulers"></i> ${l.sqft || '—'} sqft</span>
          </div>
          <p class="text-muted small mb-0">${l.property_type || ''} · ${l.days_on_market || '—'} days on market</p>
        </div>
        <div class="card-footer bg-transparent border-0 pt-0">
          ${l.url ? `<a href="${l.url}" target="_blank" class="btn btn-sm btn-outline-primary w-100"><i class="bi bi-box-arrow-up-right me-1"></i>View Listing</a>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  showStatus('success', `Found ${total} listing(s) · ${newCount} new since last run`);
}
{% if preset_client %}
// Auto-fill and run search for client {{ preset_client.first_name }}
window.addEventListener('DOMContentLoaded', () => {
  const f = {{ preset_client.filters | tojson }};
  form.querySelector('[name=location]').value    = f.location || '';
  form.querySelector('[name=distance]').value    = f.distance || 0;
  form.querySelector('[name=status]').value      = f.status || 'for sale';
  form.querySelector('[name=min_price]').value   = f.min_price || 0;
  form.querySelector('[name=max_price]').value   = f.max_price || 0;
  form.querySelector('[name=min_beds]').value    = f.min_beds || 0;
  form.querySelector('[name=min_baths]').value   = f.min_baths || 0;
  form.querySelector('[name=min_sqft]').value    = f.min_sqft || '';
  form.querySelector('[name=max_sqft]').value    = f.max_sqft || '';
  form.querySelector('[name=max_age]').value     = f.max_age || '';
  form.querySelector('[name=min_age]').value     = f.min_age || '';
  form.querySelectorAll('[name=property_types]').forEach(cb => {
    cb.checked = (f.property_types || []).includes(cb.value);
  });
  form.dispatchEvent(new Event('submit'));
});
{% endif %}
</script>
{% endblock %}
