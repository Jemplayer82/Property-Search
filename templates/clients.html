{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0"><i class="bi bi-people me-2"></i>Clients</h5>
  <a href="/clients/new" class="btn btn-primary"><i class="bi bi-person-plus me-2"></i>New Client</a>
</div>

{% if clients %}
<!-- Search & Sort Controls -->
<div class="row g-2 mb-4">
  <div class="col-md-6">
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-search"></i></span>
      <input type="text" class="form-control" id="clientSearch" placeholder="Search by name…">
    </div>
  </div>
  <div class="col-md-6 d-flex gap-2">
    <span class="text-muted align-self-center small me-1">Sort:</span>
    <button class="btn btn-sm btn-outline-secondary active" id="sortName">
      <i class="bi bi-sort-alpha-down me-1"></i>Name
    </button>
    <button class="btn btn-sm btn-outline-secondary" id="sortDate">
      <i class="bi bi-clock me-1"></i>Date Created
    </button>
  </div>
</div>
{% endif %}

{% if not clients %}
<div class="text-center text-muted py-5">
  <i class="bi bi-people" style="font-size:4rem;opacity:.3"></i>
  <p class="mt-3">No clients yet. <a href="/clients/new">Add your first client.</a></p>
</div>
{% else %}
<div class="row g-4" id="clientGrid"></div>
<p class="text-muted small mt-3" id="noResults" style="display:none">No clients match your search.</p>
{% endif %}

<script>
const rawClients = {{ clients | tojson }};
let sortMode = 'name';
let searchQuery = '';

function fmtPrice(v) {
  const n = parseInt(v);
  return isNaN(n) ? (v || '—') : '$' + n.toLocaleString();
}

function fmtFreq(f) {
  if (f === 'once_daily')  return 'Once a day';
  if (f === 'once_weekly') return 'Once a week';
  return 'Every new listing';
}

function getSorted(clients) {
  return [...clients].sort((a, b) => {
    if (sortMode === 'name') {
      const na = (a.last_name + a.first_name).toLowerCase();
      const nb = (b.last_name + b.first_name).toLowerCase();
      return na.localeCompare(nb);
    } else {
      return new Date(b.created_at) - new Date(a.created_at);
    }
  });
}

function getFiltered(clients) {
  if (!searchQuery) return clients;
  const q = searchQuery.toLowerCase();
  return clients.filter(c =>
    (c.first_name + ' ' + c.last_name).toLowerCase().includes(q)
  );
}

function renderClients() {
  const grid = document.getElementById('clientGrid');
  const noResults = document.getElementById('noResults');
  if (!grid) return;

  const visible = getFiltered(getSorted(rawClients));
  noResults.style.display = visible.length === 0 ? '' : 'none';

  grid.innerHTML = visible.map(c => `
    <div class="col-md-6 col-xl-4">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <div>
              <h5 class="mb-0">${c.first_name} ${c.last_name}</h5>
              <a href="mailto:${c.email}" class="text-muted small">${c.email}</a>
            </div>
            <div class="dropdown">
              <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="dropdown">
                <i class="bi bi-three-dots"></i>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="/clients/${c.id}/edit"><i class="bi bi-pencil me-2"></i>Edit</a></li>
                <li>
                  <form method="POST" action="/clients/${c.id}/delete" onsubmit="return confirm('Delete ${c.first_name}?')">
                    <button class="dropdown-item text-danger"><i class="bi bi-trash me-2"></i>Delete</button>
                  </form>
                </li>
              </ul>
            </div>
          </div>

          <div class="text-muted small mb-3">
            <i class="bi bi-geo-alt me-1"></i>${c.filters.location}<br>
            <i class="bi bi-cash me-1"></i>$${(c.filters.min_price||0).toLocaleString()} – $${(c.filters.max_price||0).toLocaleString()}<br>
            <i class="bi bi-door-open me-1"></i>${c.filters.min_beds}+ bed &middot; ${c.filters.min_baths}+ bath<br>
            ${c.filters.property_types?.length ? `<i class="bi bi-house me-1"></i>${c.filters.property_types.join(', ')}<br>` : ''}
            ${c.filters.max_age ? `<i class="bi bi-calendar me-1"></i>Max age: ${c.filters.max_age} yrs<br>` : ''}
            ${c.filters.min_age ? `<i class="bi bi-calendar me-1"></i>Min age: ${c.filters.min_age} yrs<br>` : ''}
            <i class="bi bi-envelope me-1"></i>${fmtFreq(c.email_frequency)}<br>
            ${c.last_emailed ? `<i class="bi bi-send me-1"></i>Last emailed: ${new Date(c.last_emailed).toLocaleString()}<br>` : ''}
            <i class="bi bi-clock me-1"></i><span class="text-muted" style="font-size:.7rem">Added ${new Date(c.created_at).toLocaleDateString()}</span>
          </div>

          <button class="btn btn-primary w-100 search-btn" data-cid="${c.id}" data-name="${c.first_name} ${c.last_name}" data-email="${c.email}">
            <i class="bi bi-search me-2"></i>Run Search
          </button>
        </div>

        <div class="result-panel d-none" id="panel-${c.id}">
          <div class="p-3">
            <div class="alert mb-3" id="status-${c.id}"></div>
            <div class="row g-3" id="listings-${c.id}"></div>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  // Attach search button handlers
  document.querySelectorAll('.search-btn').forEach(btn => {
    btn.addEventListener('click', () => runSearch(btn));
  });
}

let _mapListings = [];

function goToMap() {
  localStorage.setItem('searchResults', JSON.stringify({ listings: _mapListings, total: _mapListings.length }));
  window.location.href = '/map?results=search';
}

async function runSearch(btn) {
  const cid   = btn.dataset.cid;
  const email = btn.dataset.email;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Searching…';

  const panel  = document.getElementById('panel-' + cid);
  const status = document.getElementById('status-' + cid);
  const grid   = document.getElementById('listings-' + cid);
  panel.classList.remove('d-none');

  try {
    const res  = await fetch('/clients/' + cid + '/search', { method: 'POST' });
    const data = await res.json();

    if (data.error) {
      status.className = 'alert alert-danger mb-2';
      status.textContent = 'Error: ' + data.error;
    } else {
      // Sort newest listed first
      data.listings.sort((a, b) => {
        if (a.list_date && b.list_date) return b.list_date.localeCompare(a.list_date);
        const da = parseInt(a.days_on_market) || 9999;
        const db = parseInt(b.days_on_market) || 9999;
        return da - db;
      });
      _mapListings = data.listings;
      status.className = 'alert alert-success mb-2';
      const mapBtn = data.listings.length
        ? `<button class="btn btn-sm btn-outline-secondary ms-2" onclick="goToMap()"><i class="bi bi-map me-1"></i>View on Map</button>`
        : '';
      const emailBtn = data.listings.length
        ? `<button class="btn btn-sm btn-outline-primary ms-2" id="emailbtn-${cid}" onclick="sendEmail('${cid}')"><i class="bi bi-envelope me-1"></i>Send Email</button>`
        : '';
      status.innerHTML = `Found ${data.total} listing(s) &middot; ${data.new} new${mapBtn}${emailBtn}`;

      grid.innerHTML = data.listings.map(l => `
        <div class="col-md-6 col-xl-4">
          <div class="card h-100 shadow-sm ${l.is_new ? 'border-success border-2' : ''}">
            ${l.photo && l.photo !== 'None' && l.photo !== '' ? `<img src="${l.photo}" class="card-img-top" style="height:180px;object-fit:cover" referrerpolicy="no-referrer" onerror="this.style.display='none'">` : ''}
            <div class="card-body">
              ${l.is_new ? '<span class="badge bg-success mb-2">NEW</span>' : ''}
              <h6 class="card-title mb-1">${l.address || '—'}</h6>
              <p class="text-muted small mb-2">${l.city}, ${l.state} ${l.zip}</p>
              <p class="fs-5 fw-bold text-primary mb-2">${fmtPrice(l.price)}</p>
              <div class="d-flex gap-3 text-muted small mb-2">
                <span><i class="bi bi-door-open"></i> ${l.beds||'—'} bed</span>
                <span><i class="bi bi-droplet"></i> ${l.baths||'—'} bath</span>
                <span><i class="bi bi-rulers"></i> ${l.sqft||'—'} sqft</span>
              </div>
              <p class="text-muted small mb-0">${l.property_type||''} · ${l.days_on_market||'—'} days on market</p>
            </div>
            <div class="card-footer bg-transparent border-0 pt-0">
              ${l.url ? `<a href="${l.url}" target="_blank" class="btn btn-sm btn-outline-primary w-100"><i class="bi bi-box-arrow-up-right me-1"></i>View Listing</a>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }
  } catch(e) {
    status.className = 'alert alert-danger mb-2';
    status.textContent = 'Request failed: ' + e;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-search me-2"></i>Run Search';
  }
}

async function sendEmail(cid) {
  const btn = document.getElementById('emailbtn-' + cid);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Sending…';
  try {
    const res  = await fetch('/clients/' + cid + '/email', { method: 'POST' });
    const data = await res.json();
    if (data.error) {
      btn.innerHTML = '<i class="bi bi-x-circle me-1"></i>Failed';
      btn.classList.replace('btn-outline-primary', 'btn-outline-danger');
    } else {
      btn.innerHTML = '<i class="bi bi-check-circle me-1"></i>Sent!';
      btn.classList.replace('btn-outline-primary', 'btn-outline-success');
    }
  } catch(e) {
    btn.innerHTML = '<i class="bi bi-x-circle me-1"></i>Failed';
    btn.classList.replace('btn-outline-primary', 'btn-outline-danger');
  }
}

// Sort buttons
document.getElementById('sortName')?.addEventListener('click', function() {
  sortMode = 'name';
  this.classList.add('active');
  document.getElementById('sortDate').classList.remove('active');
  renderClients();
});
document.getElementById('sortDate')?.addEventListener('click', function() {
  sortMode = 'date';
  this.classList.add('active');
  document.getElementById('sortName').classList.remove('active');
  renderClients();
});

// Search box
document.getElementById('clientSearch')?.addEventListener('input', function() {
  searchQuery = this.value;
  renderClients();
});

renderClients();
</script>
{% endblock %}
